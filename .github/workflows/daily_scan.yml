name: 🛒 EcomIntel Daily Scan

on:
  schedule:
    - cron: '0 1 * * *'  # 02:00 CET every night
  workflow_dispatch:      # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scraper
        env:
          META_ADS_TOKEN: ${{ secrets.META_ADS_TOKEN }}
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
        run: python run_scraper.py --top 30

      - name: Commit results
        run: |
          git config --global user.name 'EcomIntel Bot'
          git config --global user.email 'ecom-intel[bot]@users.noreply.github.com'
          git add data/results.csv
          git diff --cached --quiet || git commit -m "📊 Daily scan results — $(date +'%Y-%m-%d')"
          git push
